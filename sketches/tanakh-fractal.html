<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tanakh Fractal — kissing-circle sketch</title>
<style>
  :root { --bar: #14161c; --ink: #e7e2d4; --muted:#8b93a3; --accent:#c9a35b; }
  * { box-sizing: border-box; }
  html,body { margin:0; height:100%; background:#0b0d12; color:var(--ink);
              font: 13px/1.4 -apple-system, system-ui, "Segoe UI", sans-serif; }
  #bar { position:fixed; inset:0 0 auto 0; z-index:10; display:flex; flex-wrap:wrap;
         gap:10px; align-items:center; padding:10px 14px; background:rgba(20,22,28,.86);
         backdrop-filter:blur(8px); border-bottom:1px solid #262a33; }
  #bar h1 { font-size:14px; margin:0 8px 0 0; letter-spacing:.5px; color:var(--accent); font-weight:600; }
  .seg { display:inline-flex; border:1px solid #333846; border-radius:8px; overflow:hidden; }
  .seg button { background:transparent; color:var(--muted); border:0; padding:6px 12px;
                cursor:pointer; font:inherit; }
  .seg button.on { background:var(--accent); color:#1a1206; font-weight:600; }
  .btn { background:#20242e; color:var(--ink); border:1px solid #333846; border-radius:8px;
         padding:6px 12px; cursor:pointer; font:inherit; }
  .btn:hover { border-color:var(--accent); }
  label.chk { color:var(--muted); display:inline-flex; gap:5px; align-items:center; cursor:pointer; }
  .sep { width:1px; height:22px; background:#2c313c; }
  .note { color:var(--muted); }
  #stage { position:absolute; inset:0; }
  canvas { display:block; width:100%; height:100%; }
  #cap { position:fixed; left:14px; bottom:10px; z-index:10; color:var(--muted);
         font-size:11px; max-width:60ch; }
</style>
</head>
<body>
<div id="bar">
  <h1>Tanakh Fractal</h1>
  <div class="seg" id="ideaSeg">
    <button data-idea="0" class="on">Idea 1 · Parchment</button>
    <button data-idea="1">Idea 2 · Rose Window</button>
    <button data-idea="2">Idea 3 · Neon Bloom</button>
  </div>
  <div class="sep"></div>
  <button class="btn" id="reseed">↻ Reseed</button>
  <button class="btn" id="save">⭳ PNG</button>
  <div class="sep"></div>
  <label class="chk"><input type="checkbox" id="tgLabels" checked> book labels</label>
  <label class="chk"><input type="checkbox" id="tgPasuk" checked> pesukim</label>
  <span class="note" id="seedNote"></span>
</div>
<div id="stage"><canvas id="c"></canvas></div>
<div id="cap"></div>

<script>
/* ============================================================================
   TANAKH FRACTAL — generative kissing-circle sketch
   ----------------------------------------------------------------------------
   Structure (fractal, 3 nested levels of tangent "kissing" circles):
     Level 0  Torah      one central circle
     Level 1  Sefer      5 book circles OUTSIDE, each tangent to (kissing) the
                         central circle, arranged as 5 petals
     Level 2  Parashah   n circles INSIDE each book, each tangent to the book's
                         inner rim and to its neighbours (a "necklace" packing)
     Level 3  Pasuk      one small circle per verse, wrapping 360° INSIDE each
                         parashah circle

   The GEOMETRY is one engine (layout()). The three "ideas" are just STYLES that
   read the same node tree, so you can iterate the look without touching layout.
   ========================================================================== */

/* ---- 1. DATA: the five books, their parashot, and verse (pasuk) counts ---- */
const TORAH = [
  { en:"Genesis",     tr:"Bereshit",  he:"בְּרֵאשִׁית", hue: 28, parashot:[
    ["Bereshit",146],["Noach",153],["Lech-Lecha",126],["Vayera",147],
    ["Chayei Sarah",105],["Toldot",106],["Vayetzei",148],["Vayishlach",154],
    ["Vayeshev",112],["Miketz",146],["Vayigash",106],["Vayechi",85] ]},
  { en:"Exodus",      tr:"Shemot",    he:"שְׁמוֹת", hue: 96, parashot:[
    ["Shemot",124],["Va'era",121],["Bo",106],["Beshalach",116],["Yitro",75],
    ["Mishpatim",118],["Terumah",96],["Tetzaveh",101],["Ki Tisa",139],
    ["Vayakhel",122],["Pekudei",92] ]},
  { en:"Leviticus",   tr:"Vayikra",   he:"וַיִּקְרָא", hue: 168, parashot:[
    ["Vayikra",111],["Tzav",97],["Shmini",91],["Tazria",67],["Metzora",90],
    ["Achrei Mot",80],["Kedoshim",64],["Emor",124],["Behar",57],["Bechukotai",78] ]},
  { en:"Numbers",     tr:"Bamidbar",  he:"בְּמִדְבַּר", hue: 214, parashot:[
    ["Bamidbar",159],["Nasso",176],["Beha'alotcha",136],["Sh'lach",119],
    ["Korach",95],["Chukat",87],["Balak",104],["Pinchas",168],["Matot",112],
    ["Masei",132] ]},
  { en:"Deuteronomy", tr:"Devarim",   he:"דְּבָרִים", hue: 288, parashot:[
    ["Devarim",105],["Va'etchanan",122],["Eikev",111],["Re'eh",126],
    ["Shoftim",97],["Ki Teitzei",110],["Ki Tavo",122],["Nitzavim",40],
    ["Vayelech",30],["Ha'azinu",52],["V'Zot HaBerachah",41] ]},
];

/* ---- 2. seeded RNG (mulberry32) — deterministic per seed ------------------ */
function rng(seed){ let a = seed>>>0; return ()=>{ a|=0; a=a+0x6D2B79F5|0;
  let t=Math.imul(a^a>>>15,1|a); t=t+Math.imul(t^t>>>7,61|t)^t;
  return ((t^t>>>14)>>>0)/4294967296; }; }

/* ---- 3. GEOMETRY: build the fractal node tree ----------------------------
   A "necklace" of k equal circles kissing the inside of a parent of radius R
   (and kissing neighbours) has child radius r = R·s/(1+s), s=sin(π/k), with
   child centres on a ring of radius (R−r). Same math packs parashot in a book
   and pesukim in a parashah — that's the fractal self-similarity.            */
function necklace(k){ if(k<=1) return {r:0.72, ring:0}; const s=Math.sin(Math.PI/k);
  const r=s/(1+s); return { r, ring:1-r }; }               // normalised to parent R=1

function layout(cfg, rand){
  const R0 = 1;                                            // Torah radius (unit)
  const Rb = cfg.bookScale;                                // book radius / R0
  const nB = TORAH.length;
  const a0 = -Math.PI/2 + cfg.rotate;                      // first petal points up
  const books = TORAH.map((b,i)=>{
    const ang = a0 + i*2*Math.PI/nB;
    const d   = R0 + Rb;                                    // external tangency: kiss centre
    const bx  = Math.cos(ang)*d, by = Math.sin(ang)*d;

    // parashot: necklace inside the book, first slot faces the Torah centre
    const nk = necklace(b.parashot.length);
    const pr = nk.r*Rb, pring = nk.ring*Rb;
    const pOff = ang + Math.PI + cfg.parashaSpin;          // point ring toward centre
    const parashot = b.parashot.map(([name,vn],j)=>{
      const pa = pOff + j*2*Math.PI/b.parashot.length;
      const px = bx + Math.cos(pa)*pring, py = by + Math.sin(pa)*pring;

      // pesukim: necklace (or dots) wrapping 360° inside the parashah
      const vk = necklace(vn);
      const vr = vk.r*pr, vring = vk.ring*pr;
      const vSpin = pa + Math.PI + rand()*0.6;
      const pesukim = [];
      for(let q=0;q<vn;q++){
        const va = vSpin + q*2*Math.PI/vn;
        pesukim.push({ x:px+Math.cos(va)*vring, y:py+Math.sin(va)*vring, r:vr, i:q });
      }
      return { name, x:px, y:py, r:pr, hue:b.hue, idx:j, verses:vn, pesukim };
    });
    return { book:b, x:bx, y:by, r:Rb, hue:b.hue, ang, parashot };
  });
  return { x:0, y:0, r:R0, books };
}

/* ---- 4. THREE IDEAS: same tree, different styling ------------------------- */
/* NOTE on line widths: the canvas is scaled by S (px-per-unit), so a stroke of
   width w in world units renders w·S px. To get a constant on-screen weight we
   always set lineWidth = px / S. Helper: lw(px). */
const IDEAS = [
  { /* 0 — Parchment: quiet sepia line-art, everything stroked, no fill.
         Small petals so the 5 books read as distinct, cleanly-kissing lobes. */
    name:"Parchment", bookScale:1.26, rotate:0, parashaSpin:0,
    bg1:"#f4ecd8", bg2:"#e7dcbe", pasuk:"ring",
    draw(ctx,T,S,o){ const lw=px=>px/S; const ink="#3a2a1a";
      if(o.pasuk) forPasuk(T,p=>{ if(p.r*S<0.6) return;          // skip sub-pixel
        ctx.strokeStyle="rgba(58,42,26,.28)"; ctx.lineWidth=lw(0.55); ring(ctx,p); });
      forParasha(T,pa=>{ ctx.strokeStyle="rgba(58,42,26,.75)"; ctx.lineWidth=lw(0.9);
        ring(ctx,pa); fillCircle(ctx,pa.x,pa.y,lw(1.2),"rgba(58,42,26,.7)"); });
      T.books.forEach(b=>{ ctx.strokeStyle=ink; ctx.lineWidth=lw(2.2); ring(ctx,b);
        ctx.strokeStyle="rgba(58,42,26,.28)"; ctx.lineWidth=lw(0.7); circle(ctx,b.x,b.y,b.r*1.05); });
      ctx.strokeStyle=ink; ctx.lineWidth=lw(3); ring(ctx,T);
      ctx.lineWidth=lw(0.9); circle(ctx,0,0,T.r*.84);
      if(o.labels) labelBooks(ctx,T,"rgba(58,42,26,.92)");
    }
  },
  { /* 1 — Rose Window: translucent stained-glass petals layered on dark glass */
    name:"Rose Window", bookScale:1.42, rotate:0.02, parashaSpin:0.18, pasuk:"dots",
    bg1:"#0a0f24", bg2:"#04060f",
    draw(ctx,T,S,o){ const lw=px=>px/S;
      T.books.forEach(b=>{
        fillCircle(ctx,b.x,b.y,b.r, hsla(b.hue,68,50,.12));               // petal wash
        b.parashot.forEach(pa=>{
          fillCircle(ctx,pa.x,pa.y,pa.r, hsla(pa.hue+pa.idx*5,72,58,.20));
          ctx.strokeStyle=hsla(pa.hue,85,78,.55); ctx.lineWidth=lw(1); ring(ctx,pa);
        });
        ctx.strokeStyle=hsla(b.hue,85,80,.7); ctx.lineWidth=lw(1.8); ring(ctx,b);
      });
      if(o.pasuk){ ctx.globalCompositeOperation="lighter";            // verses = points of light
        forPasuk2(T,(pa,p)=>{ const t=p.i/pa.verses;
          fillCircle(ctx,p.x,p.y,Math.max(lw(1.1),p.r*.85), hsla(pa.hue+t*36,95,74,.9)); });
        ctx.globalCompositeOperation="source-over"; }
      const g=ctx.createRadialGradient(0,0,0,0,0,T.r*1.15);           // core
      g.addColorStop(0,"rgba(255,246,222,.98)"); g.addColorStop(.55,"rgba(201,163,91,.55)");
      g.addColorStop(1,"rgba(201,163,91,0)");
      fillCircle(ctx,0,0,T.r*1.15,g);
      ctx.strokeStyle="rgba(255,246,224,.9)"; ctx.lineWidth=lw(2); ring(ctx,T);
      if(o.labels) labelBooks(ctx,T,"rgba(232,226,210,.92)");
    }
  },
  { /* 2 — Neon Bloom: dark, thin luminous strokes, hue drifts by parashah    */
    name:"Neon Bloom", bookScale:1.42, rotate:-0.04, parashaSpin:-0.12, pasuk:"ring",
    bg1:"#07080e", bg2:"#0c0f1a",
    draw(ctx,T,S,o){ const lw=px=>px/S;
      T.books.forEach(b=> fillCircle(ctx,b.x,b.y,b.r, hsla(b.hue,80,45,.07)) ); // faint petal body
      ctx.globalCompositeOperation="lighter";
      forParasha(T,pa=>{ const h=pa.hue + pa.idx*6;
        if(o.pasuk) pa.pesukim.forEach(p=>{ if(p.r*S<0.4) return; const t=p.i/pa.verses;
          ctx.strokeStyle=hsla(h + t*30, 90, 64, .5); ctx.lineWidth=lw(0.8); ring(ctx,p); });
        ctx.strokeStyle=hsla(h,95,68,.9); ctx.lineWidth=lw(1.4); ring(ctx,pa);
        fillCircle(ctx,pa.x,pa.y,Math.max(lw(1.4),pa.r*.06), hsla(h,95,82,.95));
      });
      T.books.forEach(b=>{ ctx.strokeStyle=hsla(b.hue,90,64,.75); ctx.lineWidth=lw(1.6); ring(ctx,b); });
      ctx.globalCompositeOperation="source-over";
      const g=ctx.createRadialGradient(0,0,0,0,0,T.r);
      g.addColorStop(0,"rgba(255,255,255,.95)"); g.addColorStop(1,"rgba(120,160,255,.06)");
      fillCircle(ctx,0,0,T.r,g);
      ctx.strokeStyle="rgba(205,222,255,.9)"; ctx.lineWidth=lw(1.8); ring(ctx,T);
      if(o.labels) labelBooks(ctx,T,"rgba(210,220,245,.88)");
    }
  },
];
function forPasuk2(T,fn){ forParasha(T,pa=>pa.pesukim.forEach(p=>fn(pa,p))); }

/* ---- 5. tiny draw helpers (work in the scaled world space) ---------------- */
let WORLD=1;                                              // px per unit (for label sizing)
function circle(ctx,x,y,r){ ctx.beginPath(); ctx.arc(x,y,Math.abs(r),0,7); ctx.stroke(); }
function ring(ctx,n){ ctx.beginPath(); ctx.arc(n.x,n.y,Math.abs(n.r),0,7); ctx.stroke(); }
function fillCircle(ctx,x,y,r,fill){ ctx.beginPath(); ctx.arc(x,y,Math.abs(r),0,7);
  ctx.fillStyle=fill; ctx.fill(); }
function hsla(h,s,l,a){ return `hsla(${h},${s}%,${l}%,${a})`; }
function forParasha(T,fn){ T.books.forEach(b=>b.parashot.forEach(fn)); }
function forPasuk(T,fn){ forParasha(T,pa=>pa.pesukim.forEach(fn)); }
function labelBooks(ctx,T,color){
  // Drawn inside the scaled world transform, so divide the desired px size by
  // WORLD (px-per-unit) to keep the label a constant on-screen size.
  ctx.save(); ctx.fillStyle=color; ctx.textAlign="center"; ctx.textBaseline="middle";
  const fs=Math.max(9, Math.min(22, WORLD*0.10)) / WORLD;
  ctx.font=`600 ${fs}px -apple-system,system-ui,sans-serif`;
  T.books.forEach(b=>{
    const ux=Math.cos(b.ang), uy=Math.sin(b.ang);   // push label out along the radial
    ctx.fillText(b.book.tr, b.x+ux*b.r*1.14, b.y+uy*b.r*1.14);
  });
  ctx.restore();
}

/* ---- 6. render loop ------------------------------------------------------- */
const canvas=document.getElementById("c"), ctx=canvas.getContext("2d");
let seed=Math.floor(Math.random()*1e9), ideaIdx=0;
let opts={ labels:true, pasuk:true };
// URL: #idea,seed  e.g. #2,12345 — handy for sharing/reproducing a frame
(function(){ const m=(location.hash||"").slice(1).split(","); 
  if(m[0]!=="") ideaIdx=Math.max(0,Math.min(IDEAS.length-1,+m[0]||0));
  if(m[1]) seed=+m[1]||seed; })();

function resize(){ const dpr=Math.min(2,devicePixelRatio||1);
  const w=innerWidth, h=innerHeight-0;
  canvas.width=w*dpr; canvas.height=h*dpr; canvas.style.width=w+"px"; canvas.style.height=h+"px";
  ctx.setTransform(dpr,0,0,dpr,0,0); render(); }

function render(){
  const idea=IDEAS[ideaIdx];
  const w=canvas.clientWidth, h=canvas.clientHeight;
  // background
  const bg=ctx.createLinearGradient(0,0,0,h);
  bg.addColorStop(0,idea.bg1); bg.addColorStop(1,idea.bg2);
  ctx.fillStyle=bg; ctx.fillRect(0,0,w,h);

  const rand=rng(seed + ideaIdx*97);
  const T=layout(idea,rand);
  // world extent: torah(1) + 2*book radius
  const extent=(1+2*idea.bookScale)*1.16;
  const scale=Math.min(w,h)/(2*extent);
  WORLD=scale;
  ctx.save();
  ctx.translate(w/2, h/2 + 14);         // nudge below top bar
  ctx.scale(scale,scale);
  ctx.lineJoin="round"; ctx.lineCap="round";
  // labels helper uses raw world coords; temporarily draw them post-transform:
  idea.draw(ctx,T,scale,opts);
  ctx.restore();

  document.getElementById("seedNote").textContent=`seed ${seed} · ${idea.name} · 54 parashot · ${totalPesukim()} pesukim`;
  document.getElementById("cap").textContent =
    "Fractal kissing circles: Torah (centre) → 5 books (petals) → parashot (necklace inside each book) → pesukim (necklace/dots inside each parashah). Same geometry, three styles.";
}
function totalPesukim(){ let n=0; TORAH.forEach(b=>b.parashot.forEach(p=>n+=p[1])); return n; }

/* ---- 7. UI ---------------------------------------------------------------- */
document.getElementById("ideaSeg").addEventListener("click",e=>{
  const b=e.target.closest("button"); if(!b) return;
  [...e.currentTarget.children].forEach(x=>x.classList.remove("on"));
  b.classList.add("on"); ideaIdx=+b.dataset.idea; render();
});
document.getElementById("reseed").onclick=()=>{ seed=Math.floor(Math.random()*1e9); render(); };
document.getElementById("save").onclick=()=>{ const a=document.createElement("a");
  a.download=`tanakh-fractal-${IDEAS[ideaIdx].name.replace(/\W+/g,'-')}-${seed}.png`;
  a.href=canvas.toDataURL("image/png"); a.click(); };
document.getElementById("tgLabels").onchange=e=>{ opts.labels=e.target.checked; render(); };
document.getElementById("tgPasuk").onchange=e=>{ opts.pasuk=e.target.checked; render(); };
addEventListener("resize",resize);
// reflect initial idea/seed in the UI and keep the hash in sync
function syncHash(){ location.hash=`${ideaIdx},${seed}`; }
[...document.querySelectorAll("#ideaSeg button")].forEach((b,i)=>
  b.classList.toggle("on", i===ideaIdx));
const _render=render; render=function(){ _render(); syncHash(); };
resize();
</script>
</body>
</html>
